011004,V-COMPONENT,WindVMS,V
011011,WIND DIRECTION AT 10M,WindDirection,WD10m
011012,WIND SPEED AT 10M,WindSpeedMS,WS10m
011041,MAXIMUM WIND GUST SPEED,WindGust,WG
